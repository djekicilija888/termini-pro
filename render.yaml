services:
  - type: web
    name: termini-platforma
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: PGSSL
        value: "true"
      - key: DATA_DIR
        value: /var/data
