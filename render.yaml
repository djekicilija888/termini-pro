services:
  - type: web
    name: termini-platforma-pro
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PLATFORM_NAME
        value: Termini Pro Platforma
      - key: SUPERADMIN_EMAIL
        value: admin@platform.local
      - key: SUPERADMIN_PASSWORD
        sync: false
