<!doctype html><html lang="sr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><title>Termini Pro Platforma</title><link rel="stylesheet" href="/css/styles.css?v=login-text-v53"><link rel="manifest" href="/manifest.json"></head><body><header class="top"><div class="shell nav"><a class="brand" href="/"><span class="mark">T</span><span id="platformName">Termini Pro Platforma</span></a></div></header><main class="shell"><section class="hero"><h1>Jedan sistem za mnogo salona i majstora.</h1><p class="lead">Svaka firma dobija svoj link za Instagram, QR kod, radnike, usluge, termine i pretplatu.</p><div class="actions"><a class="btn" href="#register">Registruj firmu</a></div></section><section id="register" class="grid"><div class="card"><p class="eyebrow">Registracija firme</p><h2>Napravi nalog</h2><form id="registerForm"><label>Naziv firme<input id="regName" required></label><label>Delatnost<input id="regType" placeholder="frizer, majstor..."></label><label>Grad<input id="regCity"></label><label>Telefon<input id="regPhone"></label><label>Ime vlasnika<input id="regOwner"></label><label>Email<input id="regEmail" type="email" required></label><label>Lozinka<input id="regPass" type="password" required></label><button class="btn">Registruj firmu</button></form><p id="regMsg" class="msg"></p></div><div class="card"><h2>Prijavi se</h2><form id="loginForm"><label>Email<input id="loginEmail" type="email" required></label><label>Lozinka<input id="loginPass" type="password" required></label><button class="btn">Uloguj se</button></form><p id="loginMsg" class="msg"></p></div></section></main><script src="/js/platform.js?v=login-text-v53"></script></body></html>
